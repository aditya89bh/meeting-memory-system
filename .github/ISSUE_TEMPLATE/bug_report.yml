name: Bug report
description: Report a problem so we can fix it
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please remember this project is **deterministic** —
        if you can, include the exact input that reproduces the issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Commands, sample transcript, or code that reproduces the problem.
      placeholder: |
        1. Run `meeting-memory ...`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `meeting-memory --version`.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and Python version.
      placeholder: "macOS 14, Python 3.11"
    validations:
      required: false
